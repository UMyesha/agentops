# Illustrative production composition: one image, two app processes (web +
# worker), plus Postgres and Redis with persistent volumes.
#
# Migrations are a release step, not baked into the image. After the images are
# up and Postgres is healthy, run once:
#   docker compose -f docker-compose.prod.yml run --rm web npx prisma migrate deploy
#
# Secrets come from the environment / an .env file that is NEVER committed.
# See docs/deployment.md for the full env matrix.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agentops}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: agentops:latest
    restart: unless-stopped
    command: ["npm", "start"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AGENTOPS_DEMO_MODE: ${AGENTOPS_DEMO_MODE:-false}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    # Reuse the SAME image; only the command differs.
    image: agentops:latest
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
