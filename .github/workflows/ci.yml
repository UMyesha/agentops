name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: test · typecheck · lint · build
    runs-on: ubuntu-latest
    # No service containers: the whole suite is mocked and the build uses
    # placeholder envs so it never connects to Postgres or Redis.
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Build-only placeholders — not real secrets.
      DATABASE_URL: "postgresql://build:build@localhost:5432/build?schema=public"
      AUTH_SECRET: "ci-build-only-not-a-real-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Test
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
